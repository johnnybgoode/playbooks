---
- name: Ensure tools staging dir
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.local/share/tools"
    state: directory
    mode: "0755"
- name: Copy tools
  ansible.builtin.copy:
    src: tools/
    dest: "/home/{{ ansible_user }}/.local/share/tools/"
    mode: "0755"
# Symlink onto /usr/local/bin (on the default PATH) rather than ~/.local/bin,
# which isn't on PATH for the non-interactive shell the dashboard uses to
# invoke sprite-task.
- name: Symlink tools onto PATH
  ansible.builtin.file:
    src: "/home/{{ ansible_user }}/.local/share/tools/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
  loop:
    - sprite-task
    - start-rc
